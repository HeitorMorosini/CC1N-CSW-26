<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="shortcut icon" href="images.jpg" type="image/x-icon">
    
    <title>Aula-02</title>
</head>
<body>
    <h1>Desagfio das imagens</h1>
    <h2>Imagem da Cidade</h2>
    <img src="vila-velha-es.webp" alt="Imagem da Cidade de Vila Velha" width="700px">
    <h2>Imagem de Vila Velha-ES com legenda</h2>
    <figure>
        <img src="vila-velha-es.webp" alt="Imagem da Cidade de Vila Velha" width="700px">
        <figcaption>Imagem da Cidade de Vila Velha</figcaption>
    </figure>

    <picture>
        <source srcset="vila-velha-es.webp" media="(min-width: 600px)">
        <img src="vila-velha-praia-itaparica.webp" alt="imagem da praia de itaparica">

    </picture>

</body>
